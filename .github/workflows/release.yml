name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, nix, x86_64-linux]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Verify release metadata
        run: npm run release:check -- --tag "$GITHUB_REF_NAME"
      - run: npm test
      - name: Build exact self-update npm tarball and checksum
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f npm-shrinkwrap.json' EXIT
          cp package-lock.json npm-shrinkwrap.json
          pack_json=$(npm pack --json)
          tarball=$(node -e '
            let input = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => process.stdout.write(JSON.parse(input)[0].filename));
          ' <<< "$pack_json")
          tar -tzf "$tarball" | grep -Fx 'package/npm-shrinkwrap.json'
          node - "$tarball" <<'NODE'
          const { createHash } = require("node:crypto");
          const { readFileSync, writeFileSync } = require("node:fs");
          const file = process.argv[2];
          const digest = createHash("sha256").update(readFileSync(file)).digest("hex");
          writeFileSync(`${file}.sha256`, `${digest}  ${file}\n`);
          NODE
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - name: Verify packed npm and Nix artifact versions
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        shell: bash
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/pi-daemon-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'rm -rf "$install_root"' EXIT
          rm -rf "$install_root"
          mkdir -p "$install_root"
          npm install --prefix "$install_root" --ignore-scripts --no-audit --no-fund --no-package-lock "$TARBALL"
          npm_version=$("$install_root/node_modules/.bin/pi-daemon" version)
          nix_version=$(nix run .#pi-daemon -- version)
          npm run release:check -- \
            --tag "$GITHUB_REF_NAME" \
            --artifact-version "npm=$npm_version" \
            --artifact-version "nix=$nix_version"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "${{ steps.pack.outputs.tarball }}"
          "${{ steps.pack.outputs.tarball }}.sha256"
          --generate-notes
          --verify-tag
          --latest
