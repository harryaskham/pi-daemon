name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, nix, x86_64-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - name: Build npm tarball and checksum
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          pack_json=$(npm pack --json)
          tarball=$(node -e '
            let input = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => process.stdout.write(JSON.parse(input)[0].filename));
          ' <<< "$pack_json")
          node - "$tarball" <<'NODE'
          const { createHash } = require("node:crypto");
          const { readFileSync, writeFileSync } = require("node:fs");
          const file = process.argv[2];
          const digest = createHash("sha256").update(readFileSync(file)).digest("hex");
          writeFileSync(`${file}.sha256`, `${digest}  ${file}\n`);
          NODE
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "${{ steps.pack.outputs.tarball }}"
          "${{ steps.pack.outputs.tarball }}.sha256"
          --generate-notes
          --verify-tag
