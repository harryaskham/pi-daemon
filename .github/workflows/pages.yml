name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "protocol.schema.json"
      - "session-api.schema.json"
      - "session-api.openapi.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, nix, x86_64-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Stage generated protocol contracts
        run: |
          cp protocol.schema.json docs/protocol.schema.json
          cp session-api.schema.json docs/session-api.schema.json
          cp session-api.openapi.json docs/session-api.openapi.json
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: [self-hosted, nix, x86_64-linux]
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
