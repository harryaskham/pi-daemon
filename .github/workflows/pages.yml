name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "protocol.schema.json"
      - "protocol-v2.schema.json"
      - "tool-adapter.schema.json"
      - "session-api.schema.json"
      - "session-api.openapi.json"
      - "dashboard-api.schema.json"
      - "dashboard-api.openapi.json"
      - "schedule.schema.json"
      - ".github/workflows/pages.yml"
      - "flake.nix"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, nix, x86_64-linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build static site with pinned Nix toolchain
        run: |
          nix build .#pages --print-build-logs
          mkdir -p _site
          cp -RL result/. _site/
          test -s _site/index.html
          test -s _site/protocol.schema.json
          test -s _site/protocol-v2.schema.json
          test -s _site/tool-adapter.schema.json
          test -s _site/tool-adapter-protocol/index.html
          test -s _site/dashboard-protocol/index.html
          test -s _site/dashboard-inventory/index.html
          test -s _site/shadow-tui/index.html
          test -s _site/dashboard-ownership/index.html
          test -s _site/dashboard-service-api/index.html
          test -s _site/dashboard-api.schema.json
          test -s _site/dashboard-api.openapi.json
          test -s _site/schedules/index.html
          test -s _site/schedule.schema.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: [self-hosted, nix, x86_64-linux]
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
