name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: [self-hosted, nix, x86_64-linux]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: ["22.19.0", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run pack:check

  nix:
    name: Nix (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: [self-hosted, nix, x86_64-linux]
          - name: macOS
            runner: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake check --print-build-logs
        timeout-minutes: 25
      - run: nix run .#pi-daemon -- version
        timeout-minutes: 5
